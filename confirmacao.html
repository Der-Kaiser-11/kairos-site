<!DOCTYPE html>
<html lang="en">
<head>

    <title>Kairos - Confirmacao</title>
</head>
<body>

    <h1>Confirmar Agendamento</h1>

    <p>Digite seu número de WhatsApp para confirmar:</p>

    <input type="text" id="whatsapp" placeholder="81999999999"> 

        <br><br>

        <button onclick="enviarWhatsApp()">Confirmar pelo WhatsApp</button>

    <script>

        function enviarWhatsApp(){
            let numero = 
            document.getElementById("whatsapp").value;

            let mensagem = "Óla ,Fiz Um Agendamento Pelo Kairos.       Nome: Cliente                     Serviço: Corte              Horário: 14:00 pm";

            let link = "https://wa.me/55" + numero + "?text=" + mensagem;

            window.open(link, "_blank");
        }

    </script>
</body>
</html>
